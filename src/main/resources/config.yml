database:
  # "sqlite" veya "mysql"
  type: sqlite
  sqlite-file: database.db
  # MySQL için:
  host: localhost
  port: 3306
  name: reklam
  username: root
  password: ""


blocked-words:
  enabled: true
  leet-speak: true
  words:
    - "küfür1"
    - "küfür2"
    - "argo1"


message-length:
  min: 5
  max: 100


mute-check:
  enabled: false
  permission-node: "litebans.muted"
  title-enabled: true


wait-before-new-ad: 30


default-ad-limit: 1


input-cancel-keyword: "iptal"


packages:
  SILVER:
    name: "Silver"
    price: 1500
    duration: 3600
    perm: "reklam.silver"
  GOLD:
    name: "Gold"
    price: 3500
    duration: 10800
    perm: "reklam.gold"
  EPIC:
    name: "Epic"
    price: 7500
    duration: 21600
    perm: "reklam.epic"
  DIAMOND:
    name: "Diamond"
    price: 15000
    duration: 43200
    perm: "reklam.diamond"


gui:
  title: "&8ᴏʏᴜɴᴄᴜ ʀᴇᴋʟᴀᴍʟᴀʀɪ"


  structure:
    - "# # # # # # # # #"
    - "# . . . . . . . #"
    - "# . s g e d s . #"
    - "# . g e d s g . #"
    - "# . . . . . . . #"
    - "# # # # ? # # # #"

  items:
    '#':
      material: GRAY_STAINED_GLASS_PANE
      name: " "

    '?':
      material: BOOK
      name: "<#3896FF>ʀᴇᴋʟᴀᴍʟᴀʀ ɴᴇᴅɪʀ?"
      lore:
        - " "
        - "<#B7B7B7>Bir reklam oluşturduğunda,"
        - "<#B7B7B7>tüm oyunculara bilgilendirme mesajı gönderilir"
        - " "
        - "<#B7B7B7>Boş bir alana tıklayarak"
        - "<#B7B7B7>reklamını hemen oluştur!"
        - " "

    'y':
      material: BARRIER
      name: "<#3896FF>Boş Reklam Alanı"
      lore:
        - " "
        - "<#3896FF>Fiyat: <#B7B7B7>%price% Altın"
        - "<#3896FF>Süre: <#B7B7B7>%duration% Saat"
        - " "
        - "<#B7B7B7>Bu alanı almak için tıklayın,"
        - "<#B7B7B7>Acele et, sınırlı."
        - " "
        - "<red>Kurallar:"
        - "<#B7B7B7>▪ Küfür, hakaret veya uygunsuz içeriklere izin verilmez."
        - "<#B7B7B7>▪ Reklam alanı dışında mesaj veya yönlendirme yapılamaz."
        - "<#B7B7B7>▪ Discord daveti ve iletişim bilgisi paylaşımı yasaktır."
        - "<#B7B7B7>▪ Kuralları ihlal eden kullanıcılar uzaklaştırılır."
        - " "

    'x':
      material: PLAYER_HEAD
      name: "<#3896FF>%player%'ın Reklamı"
      lore:
        - " "
        - "<#3896FF>Mesaj:"
        - "<#B7B7B7>%message%"
        - " "
        - "<#3896FF>Kalan Süre:"
        - "<#3896FF>%time%"
        - " "


time-format:
  hour: "saat"
  minute: "dakika"
  second: "saniye"


announcements:
  chat:
    enabled: true
    format: "<#3896FF>Reklam <dark_gray>▪ <#B7B7B7>%message%"

  bossbar:
    enabled: true
    color: BLUE
    style: NOTCHED_12
    title: "<#3896FF>Reklam <dark_gray>▪ <#B7B7B7>%message%"
    duration: 10

  title:
    enabled: true
    main: "<#3896FF>Reklam <dark_gray>▪"
    sub: "<#B7B7B7>%message%"

  actionbar:
    enabled: true
    text: "<#3896FF>Reklam <dark_gray>▪ <#B7B7B7>%message%"

  sound:
    enabled: true
    type: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 1.0
    pitch: 1.2


messages:
  prefix: "<#3896FF>Reklam <dark_gray>▪ "
  reload: "<green>Yapılandırma dosyaları yenilendi!"
  no-permission: "<red>Bunu yapmak için iznin yok."
  unknown-command: "<red>Bilinmeyen komut."
  insufficient-money: "<#B7B7B7>Yetersiz altın! Gereken: <#3896FF>%price% <#B7B7B7>Altın"
  input-prompt: "<#B7B7B7>Görünmesini istediğiniz mesajını yazın. <dark_gray>(İptal için <#3896FF>'iptal' <dark_gray>yazın)"
  cancel: "<gray>Mesaj dinleyicisi iptal edildi. Tekrar yazabilirsiniz."
  success:  "<gray>Reklam başarıyla gönderildi!"
  blocked-word: "<red>Mesajın yasaklı kelime içeriyor, reklam oluşturulamadı."
  papi-empty: "<dark_gray>Bu alan boş."
  invalid-length: "<gray>Mesajın <#3896FF>%min%<dark_gray>-<#3896FF>%max% <gray>karakter arasında olmalı! Tekrar gir."
  muted: "<red>Susturulmuş olduğun için reklam alamazsın!"
  wait: "<gray>Yeni reklam almadan önce <#3896FF>%seconds% saniye <gray>beklemelisin."
  max-limit: "<gray>Aynı anda en fazla <#3896FF>%limit% <gray>aktif reklamın olabilir."
  player-only: "<red>Bu komut sadece oyuncular için kullanılabilir!"
  package-not-found: "<red>Hata: Paket bulunamadı!"

  # Admin komutları
  admin-help:
    - "<#3896FF>Reklam <dark_gray>▪ <gray>Admin Yardımı"
    - "<#3896FF>/reklamadmin reload <dark_gray>- <#B7B7B7>Config'i yeniler."
    - "<#3896FF>/reklamadmin remove <slot> <dark_gray>- <#B7B7B7>Slottaki reklamı kaldırır."
    - "<#3896FF>/reklamadmin removeall <dark_gray>- <#B7B7B7>Tüm reklamları kaldırır."

  admin-remove-usage: "<gray>Kullanım: <#3896FF>/reklamadmin remove <slot>"
  admin-remove-success: "<#3896FF>#%slot% <gray>numaralı slottaki reklam kaldırıldı."
  admin-remove-empty: "<#3896FF>#%slot% <gray>numaralı slotta aktif reklam yok!"

  admin-removeall-success: "<gray>Toplam <#3896FF>%count% <gray>reklam başarıyla kaldırıldı!"
  admin-removeall-empty: "<gray>Silinecek reklam yok, tüm slotlar zaten boş!"